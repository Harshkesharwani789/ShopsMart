name: Deploy to EC2

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Deploy via SSH
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          # Go to the project directory
          cd /home/${{ secrets.EC2_USER }}/shopsmart
          
          # Pull latest code
          git pull origin main
          
          # Run the idempotent setup script to install dependencies
          chmod +x scripts/setup.sh
          ./scripts/setup.sh
          
          # Restart the backend service using pm2 or node
          cd server
          pm2 restart shopsmart-backend || pm2 start src/index.js --name shopsmart-backend
          
          # Optionally build the frontend
          cd ../client
          npm run build

name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Client Dependencies
        working-directory: client
        run: npm install

      - name: Install Server Dependencies
        working-directory: server
        run: npm install

      - name: Lint Client
        working-directory: client
        run: npm run lint

      - name: Lint Server
        working-directory: server
        run: npm run lint

      - name: Test Client
        working-directory: client
        run: npm test -- --run

      - name: Test Server
        working-directory: server
        run: npm test

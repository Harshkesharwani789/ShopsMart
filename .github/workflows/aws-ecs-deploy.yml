name: Test, Provision, and Deploy to ECS

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  TF_IN_AUTOMATION: "true"
  PROJECT_NAME: shopsmart
  TERRAFORM_DIR: terraform

jobs:
  tests:
    name: Run tests and publish reports
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Create test report directory
        run: mkdir -p test-reports

      - name: Install backend dependencies
        run: npm ci
        working-directory: server

      - name: Run backend unit and integration tests
        run: npm test -- --ci --json --outputFile=../test-reports/backend-jest.json
        working-directory: server

      - name: Install frontend dependencies
        run: npm ci
        working-directory: client

      - name: Run frontend tests
        run: npm test -- --run --reporter=json --outputFile=../test-reports/frontend-vitest.json
        working-directory: client

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: test-reports/

  deploy:
    name: Provision infrastructure and deploy ECS
    runs-on: ubuntu-latest
    needs: tests
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify workflow is using LabRole Terraform
        run: |
          git rev-parse --short HEAD
          if grep -q 'resource "aws_iam_role" "ecs_task_execution"' terraform/main.tf; then
            echo "Old Terraform code detected. Start a fresh workflow run from the latest main branch commit."
            exit 1
          fi
          grep -n 'data "aws_iam_role" "ecs_task_execution"' terraform/main.tf

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform init
        run: terraform init
        working-directory: ${{ env.TERRAFORM_DIR }}

      - name: Terraform validate
        run: terraform validate
        working-directory: ${{ env.TERRAFORM_DIR }}

      - name: Terraform plan base infrastructure
        run: >
          terraform plan
          -out=tfplan-base
          -var="aws_region=${{ secrets.AWS_REGION }}"
          -var="project_name=${{ env.PROJECT_NAME }}"
          -var="enable_ecs_service=false"
        working-directory: ${{ env.TERRAFORM_DIR }}

      - name: Terraform apply base infrastructure
        run: terraform apply -auto-approve tfplan-base
        working-directory: ${{ env.TERRAFORM_DIR }}

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend image
        id: image
        run: |
          ECR_REPOSITORY_URL="$(terraform -chdir="${TERRAFORM_DIR}" output -raw ecr_repository_url)"
          IMAGE_URI="$ECR_REPOSITORY_URL:${{ github.sha }}"
          docker build -t "$IMAGE_URI" ./server
          docker push "$IMAGE_URI"
          echo "image_uri=$IMAGE_URI" >> "$GITHUB_OUTPUT"

      - name: Terraform plan ECS deployment
        run: >
          terraform plan
          -out=tfplan-ecs
          -var="aws_region=${{ secrets.AWS_REGION }}"
          -var="project_name=${{ env.PROJECT_NAME }}"
          -var="container_image=${{ steps.image.outputs.image_uri }}"
          -var="enable_ecs_service=true"
        working-directory: ${{ env.TERRAFORM_DIR }}

      - name: Terraform apply ECS deployment
        run: terraform apply -auto-approve tfplan-ecs
        working-directory: ${{ env.TERRAFORM_DIR }}

      - name: Verify ECS service is stable
        run: |
          CLUSTER_NAME="$(terraform output -raw ecs_cluster_name)"
          SERVICE_NAME="$(terraform output -raw ecs_service_name)"
          aws ecs wait services-stable --cluster "$CLUSTER_NAME" --services "$SERVICE_NAME"
        working-directory: ${{ env.TERRAFORM_DIR }}

      - name: Print service endpoint
        run: terraform output -raw service_url
        working-directory: ${{ env.TERRAFORM_DIR }}
